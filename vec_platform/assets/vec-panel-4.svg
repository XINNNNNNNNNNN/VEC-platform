<svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="A portion of the energy is settled internally; contract and meter unchanged">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/>
    </marker>
  </defs>
  <g fill="none" stroke="#2c5282" stroke-width="2" stroke-linejoin="round">
    <!-- House left (producer) -->
    <path d="M15,55 L15,32 L32,17 L50,32 L50,55 Z" fill="#ffffff"/>
    <rect x="28" y="38" width="9" height="17" fill="#ffffff"/>
    <!-- PV roof tint on the left house to echo Panel 2 -->
    <path d="M15,32 L32,17 L50,32 Z" fill="#fff3cd" stroke="#f59f00" stroke-width="1.5"/>
    <!-- House right (consumer) -->
    <path d="M150,55 L150,32 L167,17 L185,32 L185,55 Z" fill="#ffffff"/>
    <rect x="163" y="38" width="9" height="17" fill="#ffffff"/>
  </g>
  <!-- Bill / settlement icon (center) -->
  <g fill="#ffffff" stroke="#2c5282" stroke-width="2" stroke-linejoin="round">
    <rect x="80" y="20" width="40" height="50" rx="2"/>
  </g>
  <g stroke="#6c757d" stroke-width="1">
    <line x1="85" y1="30" x2="115" y2="30"/>
    <line x1="85" y1="38" x2="115" y2="38"/>
    <line x1="85" y1="46" x2="115" y2="46"/>
    <line x1="85" y1="54" x2="105" y2="54" stroke-width="1.5"/>
  </g>
  <!-- Internal-settlement arrows -->
  <line x1="50" y1="42" x2="78" y2="42" stroke="#28a745"
        stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="122" y1="42" x2="148" y2="42" stroke="#28a745"
        stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="100" y="83" font-family="Helvetica, Arial, sans-serif"
        font-size="10" fill="#6c757d" text-anchor="middle">internal settlement</text>
</svg>
