<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="A portion of energy is settled internally at the bill level; contract and meter unchanged">
  <defs>
    <style>
      .house { fill: #ffffff; stroke: #2c5282; stroke-width: 2.5;
               stroke-linejoin: round; stroke-linecap: round; }
      .house-door { fill: #e9ecef; stroke: #2c5282; stroke-width: 1.5; }
      .house-window { fill: #fff3cd; stroke: #2c5282; stroke-width: 1.2; }
      .bill-body { fill: #ffffff; stroke: #2c5282; stroke-width: 2; }
      .bill-line { stroke: #495057; stroke-width: 1.2; }
      .bill-stamp { fill: none; stroke: #28a745; stroke-width: 1.5; }
      .bill-title { fill: #495057; font-family: Helvetica, Arial, sans-serif;
                    font-size: 7px; font-weight: 600; letter-spacing: 0.5px; }
      .bill-stamp-text { fill: #28a745; font-family: Helvetica, Arial, sans-serif;
                         font-size: 7px; font-weight: 700; }
      .arrow-energy { fill: none; stroke: #28a745; stroke-width: 2;
                      stroke-linecap: round; }
      .meter-label { fill: #6c757d; font-family: Helvetica, Arial, sans-serif;
                     font-size: 8px; font-style: italic; }
    </style>
    <filter id="shadow4" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/>
    </marker>
  </defs>

  <g filter="url(#shadow4)">
    <!-- Left house -->
    <g transform="translate(20,38)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>

    <!-- Right house -->
    <g transform="translate(184,38)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>

    <!-- Bill icon centre -->
    <g transform="translate(95,22)">
      <rect class="bill-body" x="0" y="0" width="50" height="72" rx="3"/>
      <text class="bill-title" x="25" y="11" text-anchor="middle">BILL</text>
      <line class="bill-line" x1="6" y1="20" x2="44" y2="20"/>
      <line class="bill-line" x1="6" y1="28" x2="44" y2="28"/>
      <line class="bill-line" x1="6" y1="36" x2="44" y2="36"/>
      <line class="bill-line" x1="6" y1="44" x2="34" y2="44"/>
      <line class="bill-line" x1="6" y1="52" x2="44" y2="52"/>
      <!-- VEC settlement stamp -->
      <circle class="bill-stamp" cx="38" cy="63" r="7"/>
      <text class="bill-stamp-text" x="38" y="66" text-anchor="middle">VEC</text>
    </g>
  </g>

  <!-- Energy arrows pointing into bill -->
  <path class="arrow-energy" d="M58,55 L93,55" marker-end="url(#arrowE)"/>
  <path class="arrow-energy" d="M182,55 L147,55" marker-end="url(#arrowE)"/>

  <!-- Meter labels under each house -->
  <text class="meter-label" x="38"  y="110" text-anchor="middle">Same contract &amp; meter</text>
  <text class="meter-label" x="202" y="110" text-anchor="middle">Same contract &amp; meter</text>
</svg>
