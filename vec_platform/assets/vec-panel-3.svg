<svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Energy moves between producer and consumer via the public grid">
  <defs>
    <style>
      .house { fill: #ffffff; stroke: #2c5282; stroke-width: 2.5;
               stroke-linejoin: round; stroke-linecap: round; }
      .house-door { fill: #e9ecef; stroke: #2c5282; stroke-width: 1.5; }
      .house-window { fill: #fff3cd; stroke: #2c5282; stroke-width: 1.2; }
      .pv-roof { fill: #fff3cd; stroke: #f59f00; stroke-width: 2; }
      .pv-line { stroke: #f59f00; stroke-width: 0.8; }
      .arrow-flow { fill: none; stroke: #28a745; stroke-width: 2.5;
                    stroke-linecap: round; }
      .role-label { fill: #495057; font-family: Helvetica, Arial, sans-serif;
                    font-size: 9px; font-weight: 600; }
      .price-label { fill: #6c757d; font-family: Helvetica, Arial, sans-serif;
                     font-size: 8.5px; font-style: italic; }
      .grid-line { fill: none; stroke: #6c757d; stroke-width: 1.5; }
      .grid-tower { fill: none; stroke: #6c757d; stroke-width: 1; }
    </style>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/>
    </marker>
  </defs>

  <g filter="url(#shadow3)">
    <!-- Producer house (left, PV) -->
    <g transform="translate(15,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <path class="pv-roof" d="M2,12 L18,2 L34,12 Z"/>
      <line class="pv-line" x1="5"  y1="11" x2="32" y2="6"/>
      <line class="pv-line" x1="7"  y1="8"  x2="30" y2="3.5"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
    </g>

    <!-- Consumer house (right, plain) -->
    <g transform="translate(189,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>
  </g>

  <!-- Role labels under each house -->
  <text class="role-label" x="33"  y="91" text-anchor="middle">Producer</text>
  <text class="role-label" x="207" y="91" text-anchor="middle">Consumer</text>

  <!-- Top arrow: producer → consumer (sells, earns higher than feed-in) -->
  <path class="arrow-flow"
        d="M54,58 C95,42 145,42 186,58"
        marker-end="url(#arrowGreen)"/>
  <text class="price-label" x="120" y="40" text-anchor="middle">
    Sells higher than feed-in price
  </text>

  <!-- Bottom arrow: same direction (mirrors top) labelled as buyer side -->
  <path class="arrow-flow"
        d="M54,72 C95,88 145,88 186,72"
        marker-end="url(#arrowGreen)"/>
  <text class="price-label" x="120" y="103" text-anchor="middle">
    Buys lower than retail price
  </text>

  <!-- Grid indicator at the very bottom -->
  <g transform="translate(120,118)">
    <line class="grid-line" x1="-32" y1="0" x2="32" y2="0"/>
    <line class="grid-tower" x1="-20" y1="-4" x2="-20" y2="0"/>
    <line class="grid-tower" x1="-5"  y1="-4" x2="-5"  y2="0"/>
    <line class="grid-tower" x1="10"  y1="-4" x2="10"  y2="0"/>
    <line class="grid-tower" x1="25"  y1="-4" x2="25"  y2="0"/>
  </g>
  <text class="price-label" x="120" y="132" text-anchor="middle">via public grid</text>
</svg>
