<svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Energy can move between households via the public grid">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/>
    </marker>
  </defs>
  <g fill="none" stroke="#2c5282" stroke-width="2" stroke-linejoin="round">
    <!-- 4 houses -->
    <path d="M10,50 L10,28 L25,13 L40,28 L40,50 Z" fill="#ffffff"/>
    <rect x="20" y="34" width="10" height="16" fill="#ffffff"/>
    <path d="M60,50 L60,28 L75,13 L90,28 L90,50 Z" fill="#ffffff"/>
    <rect x="70" y="34" width="10" height="16" fill="#ffffff"/>
    <path d="M110,50 L110,28 L125,13 L140,28 L140,50 Z" fill="#ffffff"/>
    <rect x="120" y="34" width="10" height="16" fill="#ffffff"/>
    <path d="M160,50 L160,28 L175,13 L190,28 L190,50 Z" fill="#ffffff"/>
    <rect x="170" y="34" width="10" height="16" fill="#ffffff"/>
    <!-- Grid bus (horizontal) + drop lines to each house -->
    <line x1="15" y1="65" x2="185" y2="65" stroke="#2c5282" stroke-width="2"/>
    <line x1="25" y1="50" x2="25" y2="65"/>
    <line x1="75" y1="50" x2="75" y2="65"/>
    <line x1="125" y1="50" x2="125" y2="65"/>
    <line x1="175" y1="50" x2="175" y2="65"/>
  </g>
  <!-- Energy flow arrows (from house 1 sweeping right along the grid) -->
  <path d="M30,65 Q60,75 70,65" fill="none" stroke="#28a745"
        stroke-width="1.5" marker-end="url(#arrow3)"/>
  <path d="M30,65 Q90,80 120,65" fill="none" stroke="#28a745"
        stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="100" y="83" font-family="Helvetica, Arial, sans-serif"
        font-size="10" fill="#6c757d" text-anchor="middle">public grid</text>
</svg>
