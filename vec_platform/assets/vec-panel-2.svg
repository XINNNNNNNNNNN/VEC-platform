<svg viewBox="0 0 220 110" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="One household has solar panels and a battery; others do not">
  <defs>
    <style>
      .house { fill: #ffffff; stroke: #2c5282; stroke-width: 2.5;
               stroke-linejoin: round; stroke-linecap: round; }
      .house-door { fill: #e9ecef; stroke: #2c5282; stroke-width: 1.5; }
      .house-window { fill: #fff3cd; stroke: #2c5282; stroke-width: 1.2; }
      .pv-roof { fill: #fff3cd; stroke: #f59f00; stroke-width: 2; }
      .pv-line { stroke: #f59f00; stroke-width: 0.8; }
      .sun { fill: #f59f00; stroke: none; }
      .sun-ray { stroke: #f59f00; stroke-width: 1.5; stroke-linecap: round; }
      .battery-body { fill: #ffffff; stroke: #2c5282; stroke-width: 1.8; }
      .battery-tip { fill: #2c5282; }
      .battery-charge { fill: #28a745; }
    </style>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Sun above House 1 -->
  <g transform="translate(40,20)">
    <circle class="sun" cx="0" cy="0" r="5"/>
    <g class="sun-ray">
      <line x1="-9" y1="0" x2="-12" y2="0"/>
      <line x1="9" y1="0" x2="12" y2="0"/>
      <line x1="0" y1="-9" x2="0" y2="-12"/>
      <line x1="0" y1="9" x2="0" y2="12"/>
      <line x1="-6.4" y1="-6.4" x2="-8.5" y2="-8.5"/>
      <line x1="6.4" y1="6.4" x2="8.5" y2="8.5"/>
      <line x1="6.4" y1="-6.4" x2="8.5" y2="-8.5"/>
      <line x1="-6.4" y1="6.4" x2="-8.5" y2="8.5"/>
    </g>
  </g>

  <g filter="url(#shadow2)">
    <!-- House 1: walls + PV roof + battery -->
    <g transform="translate(22,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <!-- PV roof overlay -->
      <path class="pv-roof" d="M2,12 L18,2 L34,12 Z"/>
      <line class="pv-line" x1="5"  y1="11" x2="32" y2="6"/>
      <line class="pv-line" x1="7"  y1="8"  x2="30" y2="3.5"/>
      <line class="pv-line" x1="9"  y1="5"  x2="27" y2="1.5"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <!-- Battery to the right of the house -->
      <g transform="translate(43,15)">
        <rect class="battery-tip" x="3.5" y="-2.5" width="4" height="3" rx="0.5"/>
        <rect class="battery-body" x="0" y="0" width="11" height="16" rx="1"/>
        <rect class="battery-charge" x="1.8" y="5" width="7.4" height="9.5" rx="0.5"/>
      </g>
    </g>

    <!-- House 2 (plain) -->
    <g transform="translate(90,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>

    <!-- House 3 (plain) -->
    <g transform="translate(138,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>

    <!-- House 4 (plain) -->
    <g transform="translate(180,42)">
      <path class="house" d="M0,32 L0,12 L18,0 L36,12 L36,32 Z"/>
      <rect class="house-door" x="14" y="19" width="8" height="13"/>
      <rect class="house-window" x="5" y="16" width="6" height="6"/>
    </g>
  </g>
</svg>
