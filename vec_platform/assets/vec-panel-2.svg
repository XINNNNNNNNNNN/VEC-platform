<svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Some households produce energy, others do not">
  <!-- Sun rays above house 1 -->
  <g stroke="#f59f00" stroke-width="1.5" stroke-linecap="round">
    <line x1="25" y1="3" x2="25" y2="8"/>
    <line x1="17" y1="6" x2="20" y2="10"/>
    <line x1="33" y1="6" x2="30" y2="10"/>
  </g>
  <circle cx="25" cy="9" r="3.5" fill="#f59f00" stroke="none"/>
  <g fill="none" stroke="#2c5282" stroke-width="2" stroke-linejoin="round">
    <!-- House 1: walls -->
    <path d="M10,55 L10,32 L25,17 L40,32 L40,55 Z" fill="#ffffff"/>
    <rect x="20" y="38" width="10" height="17" fill="#ffffff"/>
    <!-- House 1: PV roof (yellow fill, tighter lines) -->
    <path d="M10,32 L25,17 L40,32 Z" fill="#fff3cd" stroke="#f59f00" stroke-width="1.5"/>
  </g>
  <g stroke="#f59f00" stroke-width="0.8">
    <line x1="14" y1="29" x2="36" y2="29"/>
    <line x1="17" y1="26" x2="33" y2="26"/>
    <line x1="20" y1="23" x2="30" y2="23"/>
  </g>
  <g fill="none" stroke="#2c5282" stroke-width="2" stroke-linejoin="round">
    <!-- Houses 2, 3, 4 (plain) -->
    <path d="M60,55 L60,32 L75,17 L90,32 L90,55 Z" fill="#ffffff"/>
    <rect x="70" y="38" width="10" height="17" fill="#ffffff"/>
    <path d="M110,55 L110,32 L125,17 L140,32 L140,55 Z" fill="#ffffff"/>
    <rect x="120" y="38" width="10" height="17" fill="#ffffff"/>
    <path d="M160,55 L160,32 L175,17 L190,32 L190,55 Z" fill="#ffffff"/>
    <rect x="170" y="38" width="10" height="17" fill="#ffffff"/>
  </g>
  <text x="100" y="83" font-family="Helvetica, Arial, sans-serif"
        font-size="10" fill="#6c757d" text-anchor="middle">producer + consumers</text>
</svg>
